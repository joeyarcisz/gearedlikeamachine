name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint -- --max-warnings 24

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          POSTGRES_PRISMA_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
